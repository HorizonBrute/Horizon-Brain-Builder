# Horizon AIOS gateway rate-limiting - ADMIN-EDITABLE (config-exposure seam).
# ==========================================================================
# Included at http{} level by nginx.conf.template. Defines the leaky-bucket ZONES
# and their sustained RATES; a breach -> 429 JSON. This is the knob to tune throughput
# limits without editing the big template. See ADR 0003 (gateway hardening).
#
#   perip    - keyed on client IP     : a blunt per-source DoS backstop.
#   pertoken - keyed on bearer token  : per-credential fairness.
#
# Zone memory (:10m ~= 160k tracked states) rarely needs changing - the RATE is the knob.
# The per-request BURST allowances (how big a momentary spike is absorbed before 429)
# live on the `limit_req` directives inside each server's `location /`:
#   - chroma gateway  : nginx.conf.template  (burst 60 perip / 120 pertoken)
#   - ollama :11434   : ollama.conf          (burst 30 perip /  60 pertoken - lower;
#                       Ollama generation is compute-DoS-prone, ADR 0009 s4)
# Those files are seam-editable too; keep the rates here and the bursts there.

limit_req_zone $binary_remote_addr  zone=perip:10m    rate=30r/s;
limit_req_zone $http_authorization  zone=pertoken:10m rate=60r/s;
limit_req_status 429;
