# Horizon AIOS gateway fail2ban ACTION - maintains a READ-ONLY current-ban view.
# ============================================================================
# A companion action (added ALONGSIDE the iptables ban, not instead of it) that keeps a
# plain-text list of the CURRENTLY banned IPs so an operator can see the live fail/ban
# state without exec-ing into the container. ADR 0012.
#
# It writes only from the action's own <ip> tag (append on ban, remove on unban) - it does
# NOT call fail2ban-client, which would deadlock the server while it is running an action.
# On start it (re)creates an empty list; on stop it clears it.
#
# The file lands at /data/state/current_bans.txt inside the container; compose bind-mounts
# ~/docker/fail2ban/state there, so the host-visible, read-only view for the admin is:
#   \\wsl.localhost\AIOS-<brain>\home\<brain>\docker\fail2ban\state\current_bans.txt
# (brain-writable runtime STATE, exposed to the admin like the access log - not brain_etc,
#  which stays admin-RW / brain-RO config. See the fail2ban seam README.)

# Keep every action ONE simple command. fail2ban's action runner mangled multi-statement
# forms here (if/then/fi and `|| :` truncated); single commands are robust. (Verified live.)
[Definition]

actionstart = printf '' > '<banfile>'
actionstop  = printf '' > '<banfile>'
actioncheck =
actionban   = printf '%%s\n' '<ip>' >> '<banfile>'
# Delete the unbanned IP's line from the live view (self-heal or manual unban).
actionunban = sed -i '/^<ip>$/d' '<banfile>'

[Init]

# Overridable from the jail if you relocate the view.
banfile = /data/state/current_bans.txt
