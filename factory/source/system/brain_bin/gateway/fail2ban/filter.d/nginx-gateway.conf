# Horizon AIOS gateway fail2ban FILTER - ADMIN-EDITABLE (config-exposure seam).
# ============================================================================
# Matches a DENIED request in the gateway's JSON access log (the `lwcp_json` format
# defined in nginx.conf.template). A "failure" = an HTTP 403 (unauthorized / forbidden -
# the token-probing signature). Referenced by jail.d/gateway.conf as `filter = nginx-gateway`.
# ADR 0012 / gateway hardening ADR 0003.
#
# The log line looks like (tokens are NEVER logged - only the derived role):
#   {"time":"2026-07-05T02:00:00+00:00","remote_addr":"203.0.113.7","method":"GET",
#    "uri":"/api/v2/...","status":403,"body_bytes_sent":42,"request_time":0.001,
#    "role":"reader","allowed":"0"}
#
# WIDEN what counts as abuse by extending the status alternation below, e.g.
#   ..."status":(?:401|403|429),   to also count auth failures + rate-limit breaches.
# Narrowing to token probing only (403) is the safe default: it will not ban a legit but
# bursty client (those get 429s, which are throttled, not banned, unless you opt in above).
#
# IMPORTANT: `datepattern` (below) makes fail2ban STRIP the matched timestamp from the line
# BEFORE applying failregex. So failregex must NOT anchor on the leading "time" field (it is
# gone by then) — it anchors on "remote_addr", which survives the strip. (Verified with
# `fail2ban-regex <log> <this filter>`: anchoring on ^{"time" matches 0 lines.)

[Definition]
failregex = "remote_addr":"<HOST>",.*?"status":(?:403),

ignoreregex =

# The timestamp sits inside the JSON (not at line start), so point the date parser at it.
# ISO8601 with offset, e.g. 2026-07-05T02:00:00+00:00. `%%` escapes the configparser percent.
datepattern = "time":"%%Y-%%m-%%dT%%H:%%M:%%S
