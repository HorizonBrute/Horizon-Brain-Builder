# Horizon AIOS gateway intrusion banning - ADMIN-EDITABLE (config-exposure seam).
# ============================================================================
# fail2ban jail for the nginx TLS gateway. Watches the gateway's JSON access log and
# BANS a source IP that trips too many denials in a window, then SELF-HEALS (auto-unban).
# Banning is L3 - iptables in the gateway's shared network namespace - so a banned IP is
# dropped BEFORE nginx. This complements the rate limit (429) in ratelimit.conf: 429
# throttles a burst; this stops a persistent abuser (repeated 403 = token probing). ADR 0012.
#
# THE THREE KNOBS you tune (all live - no image rebuild; recreate the fail2ban service):
#   bantime  - how long a banned IP stays banned, then SELF-HEALS (auto-unban).
#   findtime - the sliding window failures are counted in.
#   maxretry - how many failures within findtime trip a ban.
# Read as: "maxretry failures within findtime -> banned for bantime, then unbanned."
#
# ON/OFF: the PRIMARY switch is FAIL2BAN_ENABLE in chroma/.env - off drops the whole
# sidecar (zero overhead, a true off). `enabled` below is the in-jail switch: keep it
# true; set false to leave the container running but stop THIS jail from acting.
#
# Time units: s (sec), m (min), h (hour), d (day). e.g. bantime = 30m, findtime = 5m.

[DEFAULT]
# Never ban internal traffic: loopback + the docker-internal range (the neuron writer,
# health probes, service-to-service). The LAN is deliberately NOT blanket-exempted, so an
# external abuser on the host NIC is bannable. Add a trusted workstation CIDR here to spare it.
# 10.0.2.0/24 = the slirp4netns host range (host-local / loopback-forwarded traffic appears
# as 10.0.2.2 under rootless docker); keep it exempt so local admin access is never banned.
# NOTE (ADR 0012 s5.1): banning only works if the log shows REAL client IPs. Real-IP
# propagation is now AUTOMATED IN CANON — stage3_brain.sh writes the systemd --user drop-in
# docker.service.d/port-driver.conf (RootlessKit --port-driver=slirp4netns, not the builtin
# masquerading driver) and restarts rootless dockerd on every deploy, so this no longer needs
# to be applied by hand. If external clients still appear here as a docker 172.x address
# (SNAT), the automation did not take effect — verify stage3_brain.sh ran and dockerd restarted.
ignoreip = 127.0.0.1/8 ::1 10.0.2.0/24 172.16.0.0/12

[gateway]
enabled  = true

# --- self-heal + threshold (THE seam knobs) ---------------------------------
bantime  = 1h
findtime = 10m
maxretry = 20

# --- wiring (change only to widen what counts as abuse) ----------------------
# filter matches HTTP 403 in the JSON access log by default (token-probing signature).
# Widen inside filter.d/nginx-gateway.conf (e.g. 401|403|429), not here.
filter   = nginx-gateway
logpath  = /var/log/nginx/access.log
# The gateway's published listeners (chroma 8000, ollama 11435 when exposed). Match the
# host ports in chroma/.env (GATEWAY_PORT / OLLAMA_GW_PORT) if you change them.
port     = 8000,11435
protocol = tcp
# iptables DROP in the gateway's netns (multiport). f2b's standard docker ban action.
banaction = iptables-multiport
# Actions: the iptables ban PLUS seam-banlist, which maintains the read-only current-ban
# view at /data/state/current_bans.txt (host-visible; see action.d/seam-banlist.conf).
action = %(action_)s
         seam-banlist
