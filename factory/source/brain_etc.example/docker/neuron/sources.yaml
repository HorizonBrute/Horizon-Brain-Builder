version: 1
schedules:
  15-minutes: '*/15 * * * *'
  hourly: 0 * * * *
  daily: 0 3 * * *
  weekly: 0 3 * * 0
sources:
- name: docs
  neuron: input_neuron_example
  bundle: example_neuron_bundle
  collection: example_docs
  tags:
  - hourly
  consumption: script
  script: doc_provider_script.py
  ingest_scope:
    include:
    - '*.md'
    - '*.txt'
  embed_model: nomic-embed-text
- name: images
  neuron: input_neuron_example
  bundle: example_neuron_bundle
  collection: example_docs
  tags:
  - hourly
  consumption: script
  script: img_provider_script.py
  ingest_scope:
    include:
    - '*.png'
    - '*.jpg'
    - '*.jpeg'
  embed_model: nomic-embed-text
