# jail.d/gateway.conf - GENERATED by gateway_config.py from gateway.conf [fail2ban].
# Do NOT hand-edit. fail2ban jail for the nginx TLS gateway. Bans a source
# IP that trips too many gateway denials in a window, then SELF-HEALS. Bans are L3
# (iptables in the gateway's shared netns), in front of nginx.

[DEFAULT]
ignoreip = 127.0.0.1/8 ::1 10.0.2.2/32

[gateway]
enabled  = true
bantime  = 1h
findtime = 10m
maxretry = 20
filter   = nginx-gateway
logpath  = /var/log/nginx/access.log
port     = 8000,11434
protocol = tcp
banaction = iptables-multiport
action = %(action_)s
         seam-banlist
