# Horizon AIOS gateway tuning - ADMIN-EDITABLE, ONE FILE (config-exposure seam).
# =============================================================================
# This is THE single place to tune how the gateway BEHAVES once it is up: how hard
# it rate-limits, and how it bans persistent abusers. You edit THIS file; the raw
# backend configs (nginx rate-limit zones, the fail2ban jail/filter/action) are
# GENERATED from it by system/brain_sbin/gateway_config.py into the sibling backend folders
# (nginx_auto_gen/, fail2ban_autoconfigs/) - never hand-edit those.
#
# This file does NOT decide what runs or what is exposed - that is stack POSTURE and
# lives in brain.env (enables, *_EXPOSE, TLS, authz mode, bind, port). Keep the two
# straight: brain.env = "what runs / what's published / where"; gateway.conf = "how
# hard it throttles / how it bans".
#
# Format: INI sections with `key = value`. Lines starting with `#` are comments.
# After editing, re-run the gateway apply (or redeploy); the generator re-renders the
# backend and the gateway is recreated to pick it up.


# --- Rate limiting (ADR 0003) -----------------------------------------------
# Leaky-bucket throttling. A breach returns 429 (JSON). Two independent limiters:
#   perip    - keyed on client IP    : a blunt per-source DoS backstop.
#   pertoken - keyed on bearer token : per-credential fairness.
# RATE  = the sustained requests/second each bucket refills at (the main knob).
# BURST = how big a momentary spike is absorbed before 429. Set PER SERVICE because
#         ollama generation is compute-DoS-prone and gets tighter bursts than chroma.
#
# DIRECTION SPLIT (ADR 0015 §5): the limits below are the EXTERNAL (off-box consumer) DoS
# defense. The INTERNAL listeners (the neuron's ingest, ADR 0015 §1) run a SEPARATE policy so
# a legitimate high-volume ingest is never throttled by the external limits. `internal_rate_limit`
# governs that: `exempt` (DEFAULT) = the internal listeners carry NO limit_req at all; `on` =
# they share the perip/pertoken zones but with the relaxed internal_burst_* below. The log
# SCHEMA is identical in both directions; only the throttling policy differs.
[ratelimit]
perip_rate            = 30r/s
pertoken_rate         = 60r/s
chroma_burst_perip    = 60
chroma_burst_pertoken = 120
ollama_burst_perip    = 30
ollama_burst_pertoken = 60
internal_rate_limit   = exempt
internal_burst_perip    = 240
internal_burst_pertoken = 480


# --- Intrusion banning / fail2ban (ADR 0012) --------------------------------
# Bans a source IP that trips too many gateway denials in a window, then SELF-HEALS
# (auto-unban). Bans are L3 (iptables in the gateway's netns), in front of nginx.
# This is the WHOLE fail2ban knob surface - the three folders it used to take are now
# generated backend under fail2ban_autoconfigs/.
#
# Read the three thresholds as: "maxretry denials within findtime -> banned for
# bantime, then unbanned." Time units: s, m, h, d (e.g. 30m, 1h, 1d).
#
#   enabled        on | off   - the in-jail switch. off = sidecar runs but this jail
#                               stops acting. (To drop the sidecar ENTIRELY - zero
#                               overhead - set FAIL2BAN_ENABLE=off in brain.env.)
#   bantime        how long a banned IP stays banned before it self-heals.
#   findtime       the sliding window denials are counted in.
#   maxretry       how many denials within findtime trip a ban.
#   ignoreip       never-ban list (space-separated CIDRs). Loopback (127.0.0.1/8 ::1)
#                  + the rootless-docker host forwarder 10.0.2.2/32 keep local/admin
#                  access unbannable. 10.0.2.2 is the slirp4netns host address - fixed
#                  by slirp's QEMU-style default subnet (10.0.2.0/24, host = .2), so it
#                  is stable across deployments while the slirp port-driver keeps its
#                  defaults. The docker-internal range is deliberately NOT exempted (a
#                  SNAT'd attacker must not hide behind it; the neuron writer never
#                  transits the gateway). Add a trusted workstation CIDR to spare it.
#                  NOTE: banning only works when the access log shows REAL client IPs
#                  (ADR 0012 s5.1 - mirrored WSL networking + slirp4netns port-driver). Both
#                  are AUTOMATED IN CANON: stage3_brain.sh pins the rootless port-driver to
#                  slirp4netns (docker.service.d/port-driver.conf) every deploy, so real-IP
#                  fidelity is established automatically during provisioning - not a manual step.
#   count_statuses which HTTP statuses in the access log count as a "denial".
#                  403 (token probing) is the safe default. Widen to catch auth
#                  failures + rate-limit breaches, e.g. 401,403,429.
[fail2ban]
enabled        = on
bantime        = 1h
findtime       = 10m
maxretry       = 20
ignoreip       = 127.0.0.1/8 ::1 10.0.2.2/32
count_statuses = 403
