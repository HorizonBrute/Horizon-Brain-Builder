# ratelimit.conf - GENERATED by gateway_config.py from gateway.conf [ratelimit].
# Do NOT hand-edit. The leaky-bucket zones + sustained rates; a breach -> 429.
# Included at http{} by nginx.conf.template. Per-location BURST sizes are rendered
# onto the limit_req lines in each server (chroma here, ollama in ollama.conf).
limit_req_zone $binary_remote_addr  zone=perip:10m    rate=30r/s;
limit_req_zone $http_authorization  zone=pertoken:10m rate=60r/s;
limit_req_status 429;
