   id="svg58"
   sodipodi:docname="default_brain_network_overview.svg"
   inkscape:version="1.4.2 (f4327f4, 2025-05-13)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview58"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     showgrid="false"
     inkscape:zoom="0.90957447"
     inkscape:cx="729.46199"
     inkscape:cy="470"
     inkscape:window-width="1920"
     inkscape:window-height="1057"
     inkscape:window-x="1912"
     inkscape:window-y="-8"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg58" />
  <defs
     id="defs4">
    <marker
       id="a"
       markerWidth="9"
       markerHeight="9"
       refX="7"
       refY="3"
       orient="auto"
       markerUnits="strokeWidth">
      <path
         d="M0,0 L7,3 L0,6 Z"
         fill="#444"
         id="path1" />
    </marker>
    <marker
       id="ab"
       markerWidth="9"
       markerHeight="9"
       refX="7"
       refY="3"
       orient="auto"
       markerUnits="strokeWidth">
      <path
         d="M0,0 L7,3 L0,6 Z"
         fill="#1a73e8"
         id="path2" />
    </marker>
    <marker
       id="ag"
       markerWidth="9"
       markerHeight="9"
       refX="7"
       refY="3"
       orient="auto"
       markerUnits="strokeWidth">
      <path
         d="M0,0 L7,3 L0,6 Z"
         fill="#188038"
         id="path3" />
    </marker>
    <marker
       id="ap"
       markerWidth="9"
       markerHeight="9"
       refX="7"
       refY="3"
       orient="auto"
       markerUnits="strokeWidth">
      <path
         d="M0,0 L7,3 L0,6 Z"
         fill="#8028cf"
         id="path4" />
    </marker>
    <style
       id="style4">
      text { fill:#202124; }
      .h  { font-size:19px; font-weight:800; }
      .b  { font-size:14px; fill:#5f6368; }
      .el { font-size:14px; font-weight:600; }
    </style>
  </defs>
  <!-- Title -->
  <text
     x="40"
     y="48"
     font-size="27"
     font-weight="800"
     id="text4">How the Default Brain Works <tspan
   font-size="15"
   font-weight="600"
   fill="#80868b"
   id="tspan4">· OVERVIEW</tspan></text>
  <text
     x="40"
     y="76"
     font-size="15"
     fill="#5f6368"
     id="text5">Your documents become searchable memory, and you ask questions that get answered from them — all through one guarded front door.</text>
  <!-- ===== YOU ===== -->
  <rect
     x="60"
     y="200"
     width="240"
     height="150"
     rx="14"
     fill="#fdecea"
     stroke="#e07a5f"
     stroke-width="2.5"
     id="rect5" />
  <text
     x="180"
     y="252"
     text-anchor="middle"
     class="h"
     id="text6">You / your app</text>
  <text
     x="180"
     y="281"
     text-anchor="middle"
     class="b"
     id="text7">ask a question,</text>
  <text
     x="180"
     y="301"
     text-anchor="middle"
     class="b"
     id="text8">get an answer</text>
  <text
     x="180"
     y="332"
     text-anchor="middle"
     font-size="28"
     id="text9">🧑‍💻</text>
  <!-- ===== DOCS ===== -->
  <rect
     x="60"
     y="560"
     width="240"
     height="140"
     rx="14"
     fill="#fff8e1"
     stroke="#f9ab00"
     stroke-width="2.2"
     id="rect9" />
  <text
     x="180"
     y="606"
     text-anchor="middle"
     class="el"
     fill="#b06000"
     id="text10">Your documents</text>
  <text
     x="180"
     y="634"
     text-anchor="middle"
     font-size="26"
     id="text11">📄</text>
  <text
     x="180"
     y="668"
     text-anchor="middle"
     class="b"
     fill="#b06000"
     id="text12">a read-only folder</text>
  <!-- ===== GATEWAY ===== -->
  <rect
     x="440"
     y="170"
     width="300"
     height="560"
     rx="14"
     fill="#eaf1fd"
     stroke="#1a73e8"
     stroke-width="3"
     id="rect12" />
  <text
     x="590"
     y="214"
     text-anchor="middle"
     class="h"
     fill="#1558b0"
     id="text13">The Gateway</text>
  <text
     x="590"
     y="238"
     text-anchor="middle"
     class="b"
     fill="#1558b0"
     id="text14">the one guarded front door</text>
  <text
     x="590"
     y="290"
     text-anchor="middle"
     font-size="42"
     id="text15">🛡️</text>
  <line
     x1="466"
     y1="320"
     x2="714"
     y2="320"
     stroke="#c6dafc"
     id="line15" />
  <text
     x="590"
     y="352"
     text-anchor="middle"
     class="el"
     fill="#1558b0"
     id="text16">Every request goes</text>
  <text
     x="590"
     y="374"
     text-anchor="middle"
     class="el"
     fill="#1558b0"
     id="text17">through here.</text>
  <text
     x="590"
     y="414"
     text-anchor="middle"
     class="b"
     id="text18">✓ checks who's allowed</text>
  <text
     x="590"
     y="440"
     text-anchor="middle"
     class="b"
     id="text19">✓ logs everything</text>
  <text
     x="590"
     y="466"
     text-anchor="middle"
     class="b"
     id="text20">✓ readers read, writers write</text>
  <text
     x="590"
     y="492"
     text-anchor="middle"
     class="b"
     id="text21">✓ blocks abusive callers</text>
  <text
     x="590"
     y="556"
     text-anchor="middle"
     class="b"
     font-style="italic"
     id="text22">Nothing reaches the inside</text>
  <text
     x="590"
     y="576"
     text-anchor="middle"
     class="b"
     font-style="italic"
     id="text23">without passing the guard.</text>
  <!-- ===== WORKERS ===== -->
  <rect
     x="918"
     y="200"
     width="500"
     height="230"
     rx="14"
     fill="#f6ecfd"
     stroke="#a142f4"
     stroke-width="2.5"
     id="rect23" />
  <text
     x="942"
     y="230"
     font-size="15px"
     font-weight="800"
     fill="#8028cf"
     id="text24">The workers</text>
  <rect
     x="942"
     y="246"
     width="210"
     height="164"
     rx="12"
     fill="#ffffff"
     stroke="#a142f4"
     stroke-width="1.8"
     id="rect24" />
  <text
     x="1047"
     y="282"
     text-anchor="middle"
     class="el"
     id="text25">Ingest worker</text>
  <text
     x="1047"
     y="312"
     text-anchor="middle"
     font-size="26px"
     id="text26">📥</text>
  <text
     x="1047"
     y="348"
     text-anchor="middle"
     class="b"
     id="text27">reads your docs and</text>
  <text
     x="1047"
     y="368"
     text-anchor="middle"
     class="b"
     id="text28">files them into memory</text>
  <text
     x="1047"
     y="394"
     text-anchor="middle"
     class="b"
     font-style="italic"
     id="text29">(the only writer)</text>
  <rect
     x="1184"
     y="246"
     width="210"
     height="164"
     rx="12"
     fill="#ffffff"
     stroke="#a142f4"
     stroke-width="1.8"
     id="rect29" />
  <text
     x="1289"
     y="282"
     text-anchor="middle"
     class="el"
     id="text30">Q&amp;A service</text>
  <text
     x="1289"
     y="312"
     text-anchor="middle"
     font-size="26px"
     id="text31">💬</text>
  <text
     x="1289"
     y="348"
     text-anchor="middle"
     class="b"
     id="text32">looks things up and</text>
  <text
     x="1289"
     y="368"
     text-anchor="middle"
     class="b"
     id="text33">writes the answer</text>
  <text
     x="1289"
     y="394"
     text-anchor="middle"
     class="b"
     font-style="italic"
     id="text34">(read-only)</text>
  <!-- ===== INSIDE ===== -->
  <rect
     x="918"
     y="510"
     width="500"
     height="290"
     rx="14"
     fill="#e9f6ec"
     stroke="#188038"
     stroke-width="2.5"
     id="rect34" />
  <text
     x="942"
     y="540"
     font-size="15px"
     font-weight="800"
     fill="#137333"
     id="text35">Inside the brain — sealed, no outside door</text>
  <rect
     x="942"
     y="626"
     width="210"
     height="150"
     rx="12"
     fill="#ffffff"
     stroke="#188038"
     stroke-width="1.8"
     id="rect35" />
  <text
     x="1047"
     y="662"
     text-anchor="middle"
     class="el"
     id="text36">Memory</text>
  <text
     x="1047"
     y="692"
     text-anchor="middle"
     font-size="26px"
     id="text37">🗂️</text>
  <text
     x="1047"
     y="726"
     text-anchor="middle"
     class="b"
     id="text38">searchable store of</text>
  <text
     x="1047"
     y="746"
     text-anchor="middle"
     class="b"
     id="text39">your knowledge</text>
  <text
     x="1047"
     y="766"
     text-anchor="middle"
     class="b"
     font-style="italic"
     id="text40">(Chroma)</text>
  <rect
     x="1184"
     y="626"
     width="210"
     height="150"
     rx="12"
     fill="#ffffff"
     stroke="#188038"
     stroke-width="1.8"
     id="rect40" />
  <text
     x="1289"
     y="662"
     text-anchor="middle"
     class="el"
     id="text41">Local AI models</text>
  <text
     x="1289"
     y="692"
     text-anchor="middle"
     font-size="26px"
     id="text42">🧠</text>
  <text
     x="1289"
     y="726"
     text-anchor="middle"
     class="b"
     id="text43">understand text and</text>
  <text
     x="1289"
     y="746"
     text-anchor="middle"
     class="b"
     id="text44">write the answers</text>
  <text
     x="1289"
     y="766"
     text-anchor="middle"
     class="b"
     font-style="italic"
     id="text45">(Ollama · on-box)</text>
  <!-- ============ ARROWS ============ -->
  <!-- You <-> Gateway -->
  <path
     d="M300,245 L434,245"
     fill="none"
     stroke="#1a73e8"
     stroke-width="2.6"
     marker-end="url(#ab)"
     id="path45" />
  <text
     x="367"
     y="237"
     text-anchor="middle"
     class="el"
     fill="#1558b0"
     id="text46">ask</text>
  <path
     d="M434,305 L300,305"
     fill="none"
     stroke="#1a73e8"
     stroke-width="2.6"
     marker-end="url(#ab)"
     id="path46" />
  <text
     x="367"
     y="326"
     text-anchor="middle"
     class="el"
     fill="#1558b0"
     id="text47">answer</text>
  <!-- Docs -> Gateway -->
  <path
     d="M300,630 L434,630"
     fill="none"
     stroke="#b06000"
     stroke-width="2.4"
     stroke-dasharray="6 4"
     marker-end="url(#a)"
     id="path47" />
  <text
     x="367"
     y="622"
     text-anchor="middle"
     class="el"
     fill="#b06000"
     id="text48">new files</text>
  <!-- Gateway -> Q&A : up and OVER the top, drops into Q&A only (never crosses Ingest) -->
  <path
     d="m 739.3994,184.01067 h 529.7148 l 2.1988,61.43533"
     fill="none"
     stroke="#8028cf"
     stroke-width="2.03142"
     marker-end="url(#ap)"
     id="path48"
     sodipodi:nodetypes="ccc" />
  <text
     x="1020"
     y="142"
     text-anchor="middle"
     class="el"
     fill="#8028cf"
     id="text49">routes your question to a worker</text>
  <!-- Gateway <-> Inside : enter the container high, bump up top, long clean risers into each box -->
  <!-- Memory line (inner riser) -->
  <path
     d="m 738.90059,586.88888 287.90061,10e-6 L 1029,620"
     fill="none"
     stroke="#188038"
     stroke-width="2.4"
     marker-end="url(#ag)"
     id="path49"
     sodipodi:nodetypes="ccc" />
  <!-- Models line (outer) — bumps over the Memory riser up high, ~54px above both arrowheads -->
  <path
     d="M 742.35672,544.61988 1268.8012,546.81871 1271,620"
     fill="none"
     stroke="#188038"
     stroke-width="2.4"
     marker-end="url(#ag)"
     id="path50"
     sodipodi:nodetypes="ccc" />
  <!-- Caption in the open middle -->
  <text
     x="590"
     y="640"
     text-anchor="middle"
     class="b"
     font-style="italic"
     id="text52">Workers reach memory &amp; models</text>
  <text
     x="590"
     y="660"
     text-anchor="middle"
     class="b"
     font-style="italic"
     id="text53">ONLY by going back through</text>
  <text
     x="590"
     y="680"
     text-anchor="middle"
     class="b"
     font-style="italic"
     id="text54">the gateway.</text>
  <!-- ============ BOTTOM NOTE ============ -->
  <rect
     x="60.004868"
     y="828.00488"
     width="1357.5809"
     height="95.990265"
     rx="12.157441"
     fill="#fafafa"
     stroke="#dadce0"
     stroke-width="1.50973"
     id="rect54" />
  <text
     x="80"
     y="856"
     font-size="15"
     font-weight="700"
     id="text55">Who can knock on the front door?</text>
  <text
     x="80"
     y="882"
     class="b"
     id="text56">🖥️  <tspan
   font-weight="700"
   fill="#333"
   id="tspan55">Workstation mode</tspan> — the door only opens to programs on <tspan
   font-weight="700"
   fill="#333"
   id="tspan56">this same computer</tspan> (the System host). Nothing on the network reaches it.</text>
  <text
     x="80"
     y="906"
     class="b"
     id="text58">🌐  <tspan
   font-weight="700"
   fill="#333"
   id="tspan57">Server mode</tspan> (this default) — the door can open to <tspan
   font-weight="700"
   fill="#333"
   id="tspan58">other machines on your network</tspan>, but only for the services you switch on. Here, just the Q&amp;A service.</text>
</svg>
